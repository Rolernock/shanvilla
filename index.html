<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Character Set & Viewport -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>
      Shanvilla Resort | Hotel, Restaurant & Accommodation in Maragua
    </title>

    <meta
      name="description"
      content="Shanvilla Resort is a premier hotel, restaurant and accommodation destination in Maragua along the Nairobi–Murang'a Highway. Enjoy affordable rooms, delicious meals, events and exceptional hospitality."
    />

    <meta
      name="keywords"
      content="Shanvilla Resort, Maragua Hotel, Murang'a Hotel, Accommodation in Maragua, Restaurant in Maragua, VIP Rooms, Deluxe Rooms, Conference Facilities, Hotels in Murang'a, Nairobi Murang'a Highway Hotel"
    />

    <meta name="author" content="Brian Juma" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#0f766e" />

    <!-- Canonical -->
    <link rel="canonical" href="https://www.shanvilla.co.ke/" />

    <!-- Favicons -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/apple-touch-icon.png"
    />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/favicon-32x32.png"
    />

    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/favicon-16x16.png"
    />

    <link
      rel="icon"
      type="image/x-icon"
      href="/favicon.ico"
    />

    <!-- Android -->
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Open Graph -->
    <meta
      property="og:title"
      content="Shanvilla Resort | Hotel, Restaurant & Accommodation in Maragua"
    />

    <meta
      property="og:description"
      content="Experience comfort, accommodation, dining and memorable events at Shanvilla Resort in Maragua."
    />

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.shanvilla.co.ke/" />

    <!-- Replace preview.png with your actual image -->
    <meta
      property="og:image"
      content="https://www.shanvilla.co.ke/preview.png"
    />

    <meta property="og:site_name" content="Shanvilla Resort" />
    <meta property="og:locale" content="en_KE" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />

    <meta
      name="twitter:title"
      content="Shanvilla Resort | Hotel, Restaurant & Accommodation in Maragua"
    />

    <meta
      name="twitter:description"
      content="Experience comfort, accommodation, dining and memorable events at Shanvilla Resort in Maragua."
    />

    <meta
      name="twitter:image"
      content="https://www.shanvilla.co.ke/preview.png"
    />

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Hotel",
        "name": "Shanvilla Resort",
        "url": "https://www.shanvilla.co.ke",
        "telephone": "+254111427894",
        "image": "https://www.shanvilla.co.ke/preview.png",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "Maragua along Nairobi-Murang'a Highway",
          "addressLocality": "Maragua",
          "addressRegion": "Murang'a County",
          "addressCountry": "KE"
        },
        "amenityFeature": [
          {
            "@type": "LocationFeatureSpecification",
            "name": "Restaurant",
            "value": true
          },
          {
            "@type": "LocationFeatureSpecification",
            "name": "Accommodation",
            "value": true
          },
          {
            "@type": "LocationFeatureSpecification",
            "name": "Free Parking",
            "value": true
          },
          {
            "@type": "LocationFeatureSpecification",
            "name": "WiFi",
            "value": true
          }
        ],
        "openingHours": "Mo-Su 00:00-23:59"
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
